<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>연수원 관리 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript"
        src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=9r2jb00oue&submodules=geocoder,service"></script>
    <style>
        /* 지역별 분포 CSS 바 차트 */
        .bar-chart-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .bar-chart-label {
            width: 50px;
            font-size: 12px;
            color: #555;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-chart-bar-wrap {
            flex: 1;
            background: #f0f0f0;
            border-radius: 4px;
            height: 20px;
            overflow: hidden;
        }

        .bar-chart-bar {
            background: #3b82f6;
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
            min-width: 2px;
        }

        .bar-chart-count {
            width: 30px;
            font-size: 12px;
            color: #333;
            font-weight: 600;
            flex-shrink: 0;
        }
    </style>
</head>

<body class="bg-gray-100">

    <style>
        /* 메인 홈페이지와 유사한 헤더 스타일 정의 (Tailwind 기반 보조) */
        .main-header {
            background-color: #0077cc;
            color: white;
            padding: 1rem 0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .main-header a {
            color: white;
            text-decoration: none;
        }

        .main-header nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin: 0;
            padding: 0;
        }

        .main-header nav a {
            opacity: 0.8;
            font-size: 0.95rem;
            font-weight: 500;
            padding-bottom: 4px;
            transition: opacity 0.2s;
        }

        .main-header nav a:hover,
        .main-header nav a.active {
            opacity: 1;
        }

        .main-header nav a.active {
            border-bottom: 2px solid white;
        }
    </style>

    <!-- 메인 홈페이지 테마의 상단 네비게이션 -->
    <header class="main-header">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-10">
            <div class="flex items-center gap-3">
                <a href="../index.html"
                    class="text-xl font-bold flex items-center gap-2 hover:opacity-90 transition-opacity">
                    <span>📍</span> 연수원 여기어때 <span
                        class="text-sm font-normal bg-blue-800 px-2 py-0.5 rounded-full ml-1">Admin</span>
                </a>
            </div>

            <nav class="hidden sm:flex items-center">
                <ul>
                    <li><a href="index.html" class="active">대시보드</a></li>
                    <li><a href="list.html">연수원 관리 (목록)</a></li>
                </ul>
            </nav>

            <div class="flex items-center gap-4">
                <span id="adminEmail" class="text-sm opacity-80 hidden sm:inline-block"></span>
                <button id="logoutBtn"
                    class="bg-white bg-opacity-20 hover:bg-opacity-30 px-3 py-1.5 rounded text-sm transition-colors">
                    로그아웃
                </button>
            </div>
        </div>
        <!-- 모바일 탭 메뉴 추가 (선택사항) -->
        <div class="sm:hidden flex justify-center mt-3 border-t border-blue-500 pt-3 gap-6">
            <a href="index.html" class="active text-sm opacity-100 border-b-2 border-white pb-1">대시보드</a>
            <a href="list.html" class="text-sm opacity-80 hover:opacity-100 pb-1">연수원 관리</a>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- ===== 통계 카드 섹션 (기능 11, 12 개선) ===== -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white rounded-lg shadow p-5 text-center">
                <div class="text-3xl font-bold text-blue-600" id="stat-total">-</div>
                <div class="text-sm text-gray-500 mt-1">총 연수원 수</div>
            </div>
            <div class="bg-white rounded-lg shadow p-5 text-center">
                <div class="text-3xl font-bold text-green-600" id="stat-regions">-</div>
                <div class="text-sm text-gray-500 mt-1">등록된 지역 수</div>
            </div>
        </div>

        <!-- 지역별 분포 + 최근 등록 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- 지역별 분포 (CSS 바 차트) -->
            <div class="bg-white rounded-lg shadow p-5">
                <h3 class="font-semibold text-gray-700 mb-4">📊 지역별 연수원 분포</h3>
                <div id="region-chart">
                    <div class="text-sm text-gray-400">로딩 중...</div>
                </div>
            </div>
            <!-- 조회수 TOP 5 -->
            <div class="bg-white rounded-lg shadow p-5">
                <h3 class="font-semibold text-gray-700 mb-4">📈 많이 조회된 연수원 TOP 5</h3>
                <div id="popular-list">
                    <div class="text-sm text-gray-400">로딩 중...</div>
                </div>
            </div>
        </div>



        <!-- Firebase SDK -->
        <script type="module">
            import { initializeFirebaseApp } from '../firebase-config.js';

            const { db, auth, modules } = await initializeFirebaseApp();
            const { getDoc, doc, getDocs, collection, addDoc, updateDoc, deleteDoc } = modules;
            const { signOut, onAuthStateChanged } = modules;

            // ✅ 인증 확인 및 관리자 권한 검증
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    window.location.href = './login.html';
                    return;
                }
                try {
                    const userDocRef = doc(db, 'users', user.uid);
                    const userDoc = await getDoc(userDocRef);
                    if (!userDoc.exists() || userDoc.data().isAdmin !== true) {
                        // 권한 없음: 로그아웃 및 접근 차단
                        alert('관리자 권한이 없습니다. 접근이 차단되었습니다.');
                        await signOut(auth);
                        window.location.href = './login.html';
                        return;
                    }
                } catch (e) {
                    console.error('Firestore 관리자 권한 확인 중 오류:', e);
                    alert('권한 확인 중 오류가 발생했습니다.');
                    await signOut(auth);
                    window.location.href = './login.html';
                    return;
                }
                // 검증이 완료된 최고 관리자만 아래 코드 실행
                document.getElementById('adminEmail').textContent = user.email;
            });

            // ===== 통계 계산 및 렌더링 (기능 11) =====
            async function renderStats(centers) {
                const total = centers.length;
                const regionMap = {};
                let capacitySum = 0, capacityCount = 0;
                let latestDate = null;

                centers.forEach(c => {
                    // 지역별 카운트
                    const r = c.region || '기타';
                    regionMap[r] = (regionMap[r] || 0) + 1;

                    // 수용인원 합계
                    if (c.capacity) { capacitySum += parseInt(c.capacity); capacityCount++; }

                    // 최근 등록일
                    const created = c.createdAt?.toDate?.() || (c.createdAt ? new Date(c.createdAt) : null);
                    if (created && (!latestDate || created > latestDate)) latestDate = created;
                });

                // 요약 카드
                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-regions').textContent = Object.keys(regionMap).length;

                // 지역별 바 차트
                const maxVal = Math.max(...Object.values(regionMap), 1);
                const sorted = Object.entries(regionMap).sort((a, b) => b[1] - a[1]);
                document.getElementById('region-chart').innerHTML = sorted.map(([region, count]) => `
                <div class="bar-chart-row">
                    <span class="bar-chart-label">${region}</span>
                    <div class="bar-chart-bar-wrap">
                        <div class="bar-chart-bar" style="width:${Math.round(count / maxVal * 100)}%"></div>
                    </div>
                    <span class="bar-chart-count">${count}</span>
                </div>
            `).join('');

                // 많이 조회된 연수원 TOP 5 (clickCount 기준 내림차순 정렬)
                const popular = [...centers]
                    .filter(c => c.clickCount && c.clickCount > 0)
                    .sort((a, b) => b.clickCount - a.clickCount)
                    .slice(0, 5);

                document.getElementById('popular-list').innerHTML = popular.length > 0 ? popular.map(c => {
                    return `
                    <div class="flex justify-between items-center py-2 border-b border-gray-100 last:border-0">
                        <div>
                            <span class="font-medium text-sm text-gray-800">${c.name}</span>
                            ${c.region ? `<span class="ml-2 text-xs text-gray-400">${c.region}</span>` : ''}
                        </div>
                        <span class="text-xs font-semibold text-orange-500">${c.clickCount.toLocaleString()}회 조회</span>
                    </div>
                `;
                }).join('') : '<p class="text-sm text-gray-400">아직 조회된 데이터가 없습니다.</p>';
            }

            // ===== 대시보드 데이터 로드 =====
            async function loadCenters() {
                try {
                    const querySnapshot = await getDocs(collection(db, "trainingCenters"));
                    const allCenters = [];
                    querySnapshot.forEach((d) => {
                        allCenters.push({ id: d.id, ...d.data() });
                    });

                    // 통계 렌더링만 수행 (테이블 로직 제거됨)
                    await renderStats(allCenters);
                } catch (error) {
                    console.error("데이터 로드 중 오류:", error);
                }
            }

            // 로그아웃
            document.getElementById('logoutBtn').addEventListener('click', () => {
                signOut(auth).then(() => window.location.href = './login.html');
            });

            loadCenters();
        </script>
</body>

</html>
