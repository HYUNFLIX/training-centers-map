    <!-- Firebase SDK & Logic -->
    <script type="module">
        import { initializeFirebaseApp } from '../firebase-config.js';

        const { db, auth, modules } = await initializeFirebaseApp();
        const { getDoc, doc, getDocs, collection } = modules;
        const { signOut, onAuthStateChanged } = modules;

        // ✅ 인증 확인 및 관리자 권한 검증
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = './login.html';
                return;
            }
            try {
                const userDocRef = doc(db, 'users', user.uid);
                const userDoc = await getDoc(userDocRef);
                if (!userDoc.exists() || userDoc.data().isAdmin !== true) {
                    alert('관리자 권한이 없습니다. 접근이 차단되었습니다.');
                    await signOut(auth);
                    window.location.href = './login.html';
                    return;
                }
            } catch (e) {
                console.error('Firestore 인증 오류:', e);
                window.location.href = './login.html';
                return;
            }
            document.getElementById('adminEmail').textContent = user.email;
        });

        // 헬퍼 함수: 날짜 포맷
        const formatDate = (dateObj) => {
            if (!dateObj) return '-';
            const date = dateObj.toDate ? dateObj.toDate() : new Date(dateObj);
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
        };

        // 전역 차트 인스턴스 (재렌더링 시 파괴 용도)
        let charts = {};

        // ===== 통계 렌더링 =====
        async function renderStats(centers) {
            document.getElementById('last-updated').textContent = `최근 업데이트: ${new Date().toLocaleTimeString('ko-KR')}`;

            // 1. 요약 카드 계산
            const total = centers.length;
            const regionMap = {};
            let capacitySum = 0;
            let capacityZones = { "0-50명": 0, "51-100명": 0, "101-300명": 0, "301명 이상": 0, "미상": 0 };

            centers.forEach(c => {
                const r = c.region || '기타';
                regionMap[r] = (regionMap[r] || 0) + 1;

                if (c.capacity) {
                    const cap = parseInt(c.capacity);
                    if (!isNaN(cap)) {
                        capacitySum += cap;
                        if (cap <= 50) capacityZones["0-50명"]++;
                        else if (cap <= 100) capacityZones["51-100명"]++;
                        else if (cap <= 300) capacityZones["101-300명"]++;
                        else capacityZones["301명 이상"]++;
                    } else {
                        capacityZones["미상"]++;
                    }
                } else {
                    capacityZones["미상"]++;
                }

            });

            // 조회수 통계 계산
            const clickCounts = centers.map(c => c.clickCount || 0);
            const totalClicks = clickCounts.reduce((a, b) => a + b, 0);
            const avgClicks = centers.length > 0 ? totalClicks / centers.length : 0;
            const sortedClicks = [...clickCounts].sort((a, b) => a - b);
            const medianClicks = sortedClicks.length > 0
                ? sortedClicks.length % 2 === 0
                    ? (sortedClicks[sortedClicks.length / 2 - 1] + sortedClicks[sortedClicks.length / 2]) / 2
                    : sortedClicks[Math.floor(sortedClicks.length / 2)]
                : 0;
            const maxClicks = Math.max(...clickCounts, 0);
            const zeroClickCount = clickCounts.filter(c => c === 0).length;

            document.getElementById('stat-total').textContent = total.toLocaleString();
            document.getElementById('stat-regions').textContent = Object.keys(regionMap).length;
            document.getElementById('stat-capacity').innerHTML = `${capacitySum.toLocaleString()}<span class="text-lg font-normal text-slate-400 ml-1">명</span>`;
            document.getElementById('stat-clicks').innerHTML = `${totalClicks.toLocaleString()}<span class="text-lg font-normal text-slate-400 ml-1">회</span>`;

            // 조회수 미니 카드
            document.getElementById('click-avg').textContent = avgClicks.toFixed(1);
            document.getElementById('click-median').textContent = medianClicks.toLocaleString();
            document.getElementById('click-max').textContent = maxClicks.toLocaleString();
            document.getElementById('click-zero').textContent = `${zeroClickCount}개`;


            // Chart.js 공통 옵션
            Chart.defaults.font.family = "'Pretendard', 'Noto Sans KR', sans-serif";
            Chart.defaults.color = '#64748b';

            // 1. 지역별 분포 차트
            const sortedRegions = Object.entries(regionMap).sort((a, b) => b[1] - a[1]);
            const rLabels = sortedRegions.map(i => i[0]);
            const rData = sortedRegions.map(i => i[1]);

            if (charts.region) charts.region.destroy();
            charts.region = new Chart(document.getElementById('regionCanvas'), {
                type: 'bar',
                data: {
                    labels: rLabels,
                    datasets: [{
                        label: '연수원 수',
                        data: rData,
                        backgroundColor: '#3b82f6',
                        borderRadius: 4,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [2, 4], color: '#f1f5f9' }, ticks: { precision: 0 } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 2. 수용 인원 규모 분포 바 차트
            if (charts.capacity) charts.capacity.destroy();
            charts.capacity = new Chart(document.getElementById('capacityCanvas'), {
                type: 'bar',
                data: {
                    labels: Object.keys(capacityZones),
                    datasets: [{
                        label: '연수원 수',
                        data: Object.values(capacityZones),
                        backgroundColor: '#10b981',
                        borderRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y', // 가로 막대
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, grid: { borderDash: [2, 4], color: '#f1f5f9' }, ticks: { precision: 0 } },
                        y: { grid: { display: false } }
                    }
                }
            });

            // 4. 지역별 평균 조회수 차트
            const regionClickMap = {};
            centers.forEach(c => {
                const r = c.region || '기타';
                if (!regionClickMap[r]) regionClickMap[r] = { total: 0, count: 0 };
                regionClickMap[r].total += (c.clickCount || 0);
                regionClickMap[r].count++;
            });
            const regionClickEntries = Object.entries(regionClickMap)
                .map(([k, v]) => [k, v.count > 0 ? v.total / v.count : 0])
                .sort((a, b) => b[1] - a[1]);

            if (charts.regionClick) charts.regionClick.destroy();
            charts.regionClick = new Chart(document.getElementById('regionClickCanvas'), {
                type: 'bar',
                data: {
                    labels: regionClickEntries.map(e => e[0]),
                    datasets: [{
                        label: '평균 조회수',
                        data: regionClickEntries.map(e => Math.round(e[1] * 10) / 10),
                        backgroundColor: '#8b5cf6',
                        borderRadius: 4,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, grid: { borderDash: [2, 4], color: '#f1f5f9' }, ticks: { precision: 1 } },
                        y: { grid: { display: false } }
                    }
                }
            });

            // 5. 조회수 TOP 10
            const popular = [...centers]
                .filter(c => c.clickCount && c.clickCount > 0)
                .sort((a, b) => b.clickCount - a.clickCount)
                .slice(0, 10);

            const topMaxClick = popular.length > 0 ? popular[0].clickCount : 1;
            document.getElementById('popular-list').innerHTML = popular.length > 0 ? popular.map((c, i) => `
                <div class="flex items-center justify-between p-2.5 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-colors group">
                    <div class="flex items-center gap-2.5 min-w-0">
                        <div class="flex items-center justify-center w-5 h-5 rounded-full ${i === 0 ? 'bg-amber-100 text-amber-600 font-bold' : i === 1 ? 'bg-slate-200 text-slate-600 font-bold' : i === 2 ? 'bg-orange-100 text-orange-700 font-bold' : 'bg-slate-100 text-slate-400'} text-xs shrink-0">
                            ${i + 1}
                        </div>
                        <div class="min-w-0 flex-1">
                            <h4 class="text-sm font-semibold text-slate-700 truncate group-hover:text-blue-600 transition-colors">${c.name}</h4>
                            <div class="flex items-center gap-2 mt-1">
                                <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div class="h-full bg-rose-400 rounded-full" style="width: ${(c.clickCount / topMaxClick * 100).toFixed(0)}%"></div>
                                </div>
                                <span class="text-xs font-semibold text-rose-500 shrink-0">${c.clickCount.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('') : '<div class="text-sm text-slate-400 text-center py-4">조회 데이터가 없습니다.</div>';

            // 6. 조회수 분포 히스토그램
            const clickBuckets = { '0회': 0, '1-5회': 0, '6-10회': 0, '11-20회': 0, '21-50회': 0, '51-100회': 0, '101회+': 0 };
            clickCounts.forEach(c => {
                if (c === 0) clickBuckets['0회']++;
                else if (c <= 5) clickBuckets['1-5회']++;
                else if (c <= 10) clickBuckets['6-10회']++;
                else if (c <= 20) clickBuckets['11-20회']++;
                else if (c <= 50) clickBuckets['21-50회']++;
                else if (c <= 100) clickBuckets['51-100회']++;
                else clickBuckets['101회+']++;
            });

            if (charts.clickDist) charts.clickDist.destroy();
            charts.clickDist = new Chart(document.getElementById('clickDistCanvas'), {
                type: 'bar',
                data: {
                    labels: Object.keys(clickBuckets),
                    datasets: [{
                        label: '연수원 수',
                        data: Object.values(clickBuckets),
                        backgroundColor: ['#94a3b8', '#38bdf8', '#22d3ee', '#2dd4bf', '#a78bfa', '#f472b6', '#fb923c'],
                        borderRadius: 4,
                        barPercentage: 0.7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [2, 4], color: '#f1f5f9' }, ticks: { precision: 0 } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 7. 인사이트 자동 생성
            const insights = [];
            // 상위 집중도
            if (popular.length >= 3) {
                const top3Clicks = popular.slice(0, 3).reduce((a, c) => a + c.clickCount, 0);
                const top3Pct = totalClicks > 0 ? (top3Clicks / totalClicks * 100).toFixed(1) : 0;
                insights.push({
                    icon: 'bg-rose-100 text-rose-600',
                    title: '상위 집중도',
                    desc: `TOP 3 연수원이 전체 조회수의 <strong>${top3Pct}%</strong>를 차지합니다.`,
                    badge: top3Pct > 50 ? '높음' : top3Pct > 30 ? '보통' : '낮음',
                    badgeColor: top3Pct > 50 ? 'bg-rose-50 text-rose-600' : top3Pct > 30 ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'
                });
            }
            // 미조회 비율
            if (zeroClickCount > 0) {
                const zeroPct = (zeroClickCount / total * 100).toFixed(1);
                insights.push({
                    icon: 'bg-amber-100 text-amber-600',
                    title: '미조회 연수원',
                    desc: `전체의 <strong>${zeroPct}%</strong> (${zeroClickCount}개)가 아직 한 번도 조회되지 않았습니다.`,
                    badge: zeroPct > 50 ? '주의' : '정상',
                    badgeColor: zeroPct > 50 ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'
                });
            }
            // 지역별 편차
            if (regionClickEntries.length >= 2) {
                const topRegion = regionClickEntries[0];
                const bottomRegion = regionClickEntries[regionClickEntries.length - 1];
                insights.push({
                    icon: 'bg-violet-100 text-violet-600',
                    title: '지역 간 편차',
                    desc: `<strong>${topRegion[0]}</strong> 평균 ${topRegion[1].toFixed(1)}회 vs <strong>${bottomRegion[0]}</strong> 평균 ${bottomRegion[1].toFixed(1)}회`,
                    badge: `${(topRegion[1] / Math.max(bottomRegion[1], 0.1)).toFixed(1)}배 차이`,
                    badgeColor: 'bg-violet-50 text-violet-600'
                });
            }
            // 이상치 탐지 (평균의 3배 이상)
            const outlierThreshold = avgClicks * 3;
            const outliers = centers.filter(c => (c.clickCount || 0) > outlierThreshold && outlierThreshold > 0);
            if (outliers.length > 0) {
                insights.push({
                    icon: 'bg-sky-100 text-sky-600',
                    title: '이상치 감지',
                    desc: `평균(${avgClicks.toFixed(1)})의 3배 이상 조회된 연수원 <strong>${outliers.length}개</strong>: ${outliers.slice(0, 3).map(c => c.name).join(', ')}${outliers.length > 3 ? ' 외' : ''}`,
                    badge: '특이',
                    badgeColor: 'bg-sky-50 text-sky-600'
                });
            }
            // 평균 vs 중앙값 비교
            if (medianClicks > 0 && avgClicks > 0) {
                const skew = avgClicks / medianClicks;
                insights.push({
                    icon: 'bg-emerald-100 text-emerald-600',
                    title: '분포 편향',
                    desc: skew > 2
                        ? `평균(${avgClicks.toFixed(1)})이 중앙값(${medianClicks})보다 <strong>${skew.toFixed(1)}배</strong> 높습니다. 소수 인기 연수원이 평균을 높이고 있습니다.`
                        : `평균(${avgClicks.toFixed(1)})과 중앙값(${medianClicks})이 비교적 균형적입니다.`,
                    badge: skew > 2 ? '편향' : '균형',
                    badgeColor: skew > 2 ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'
                });
            }

            document.getElementById('insights-list').innerHTML = insights.length > 0 ? insights.map(ins => `
                <div class="p-3 rounded-lg border border-slate-100 hover:border-slate-200 transition-colors">
                    <div class="flex items-center justify-between mb-1.5">
                        <div class="flex items-center gap-2">
                            <div class="w-5 h-5 rounded-full ${ins.icon} flex items-center justify-center">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                            </div>
                            <span class="text-sm font-semibold text-slate-700">${ins.title}</span>
                        </div>
                        <span class="text-xs font-medium px-1.5 py-0.5 rounded ${ins.badgeColor}">${ins.badge}</span>
                    </div>
                    <p class="text-xs text-slate-500 leading-relaxed">${ins.desc}</p>
                </div>
            `).join('') : '<div class="text-sm text-slate-400 text-center py-4">분석할 데이터가 부족합니다.</div>';

            // 5. 최근 생성된 연수원 (타임라인 뷰)
            const recent = [...centers]
                .filter(c => c.createdAt)
                .sort((a, b) => {
                    const dateA = a.createdAt?.seconds || 0;
                    const dateB = b.createdAt?.seconds || 0;
                    return dateB - dateA;
                })
                .slice(0, 5);

            document.getElementById('recent-list').innerHTML = recent.length > 0 ? recent.map((c, i) => `
                <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                    <div class="flex items-center justify-center w-6 h-6 rounded-full border-4 border-white bg-indigo-200 text-slate-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 relative z-10 transition-colors group-hover:bg-indigo-500"></div>
                    <div class="w-[calc(100%-2.5rem)] md:w-[calc(50%-1.5rem)] p-3 rounded-lg border border-slate-100 bg-white shadow-sm transition-all group-hover:shadow-md group-hover:border-indigo-100">
                        <div class="flex items-center justify-between mb-1">
                            <div class="font-bold text-slate-700 text-sm group-hover:text-indigo-600 transition-colors">${c.name}</div>
                            <time class="font-mono text-xs text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded">${formatDate(c.createdAt)}</time>
                        </div>
                        <div class="text-xs text-slate-500">${c.region || '지역 미상'}</div>
                    </div>
                </div>
            `).join('') : '<div class="text-sm text-slate-400 text-center py-4">최근 등록된 데이터가 없습니다.</div>';
        }

        // ===== 데이터 로드 =====
        async function loadCenters() {
            try {
                const querySnapshot = await getDocs(collection(db, "trainingCenters"));
                const allCenters = [];
                querySnapshot.forEach((d) => {
                    allCenters.push({ id: d.id, ...d.data() });
                });
                await renderStats(allCenters);
            } catch (error) {
                console.error("데이터 로드 중 오류:", error);
                document.getElementById('last-updated').textContent = "연결 오류";
            }
        }

        // 로그아웃 이벤트
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = './login.html');
        });

        loadCenters();
    </script>
</body>

</html>
