<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연수원 관리 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript"
        src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=9r2jb00oue&submodules=geocoder"></script>
    <style>
        /* 지역별 분포 CSS 바 차트 */
        .bar-chart-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .bar-chart-label {
            width: 50px;
            font-size: 12px;
            color: #555;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-chart-bar-wrap {
            flex: 1;
            background: #f0f0f0;
            border-radius: 4px;
            height: 20px;
            overflow: hidden;
        }

        .bar-chart-bar {
            background: #3b82f6;
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
            min-width: 2px;
        }

        .bar-chart-count {
            width: 30px;
            font-size: 12px;
            color: #333;
            font-weight: 600;
            flex-shrink: 0;
        }
    </style>
</head>

<body class="bg-gray-100">

    <!-- 네비게이션 바 -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-4">
                    <span class="text-xl font-semibold">연수원 관리</span>
                    <span id="adminEmail" class="text-sm text-gray-500"></span>
                </div>
                <div class="flex items-center gap-3">
                    <a href="../index.html" class="text-sm text-blue-600 hover:underline">← 지도로 돌아가기</a>
                    <button id="logoutBtn"
                        class="text-gray-600 hover:text-gray-900 text-sm px-3 py-1 border rounded">로그아웃</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 메인 컨텐츠 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- ===== 통계 카드 섹션 (기능 11) ===== -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-lg shadow p-5 text-center">
                <div class="text-3xl font-bold text-blue-600" id="stat-total">-</div>
                <div class="text-sm text-gray-500 mt-1">총 연수원 수</div>
            </div>
            <div class="bg-white rounded-lg shadow p-5 text-center">
                <div class="text-3xl font-bold text-green-600" id="stat-regions">-</div>
                <div class="text-sm text-gray-500 mt-1">등록된 지역 수</div>
            </div>
            <div class="bg-white rounded-lg shadow p-5 text-center">
                <div class="text-3xl font-bold text-purple-600" id="stat-avg">-</div>
                <div class="text-sm text-gray-500 mt-1">평균 수용인원 (명)</div>
            </div>
            <div class="bg-white rounded-lg shadow p-5 text-center">
                <div class="text-xl font-bold text-orange-500" id="stat-latest">-</div>
                <div class="text-sm text-gray-500 mt-1">최근 등록일</div>
            </div>
        </div>

        <!-- 지역별 분포 + 최근 등록 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- 지역별 분포 (CSS 바 차트) -->
            <div class="bg-white rounded-lg shadow p-5">
                <h3 class="font-semibold text-gray-700 mb-4">📊 지역별 연수원 분포</h3>
                <div id="region-chart">
                    <div class="text-sm text-gray-400">로딩 중...</div>
                </div>
            </div>
            <!-- 최근 등록 5개 -->
            <div class="bg-white rounded-lg shadow p-5">
                <h3 class="font-semibold text-gray-700 mb-4">🕐 최근 등록된 연수원</h3>
                <div id="recent-list">
                    <div class="text-sm text-gray-400">로딩 중...</div>
                </div>
            </div>
        </div>

        <!-- 제어 영역 (검색 & 버튼) -->
        <div class="mb-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h3 class="font-semibold text-gray-700 w-full sm:w-auto">전체 연수원 목록</h3>
            <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
                <div class="relative w-full sm:w-64">
                    <input type="text" id="searchInput" placeholder="연수원명 또는 지역 등 검색..."
                        class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-sm">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
                <button id="addCenterBtn"
                    class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-sm whitespace-nowrap">
                    + 새 연수원 추가
                </button>
                <button id="excelDownBtn"
                    class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded text-sm whitespace-nowrap">
                    엑셀 다운로드
                </button>
            </div>
        </div>

        <!-- 연수원 목록 테이블 -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">번호
                        </th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">연수원명
                        </th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">지역
                        </th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">수용인원
                        </th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">기본정보
                        </th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">관리
                        </th>
                    </tr>
                </thead>
                <tbody id="centersList" class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="6" class="px-4 py-8 text-center text-gray-400">로딩 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 통합 연수원 추가/수정 모달 -->
    <div id="centerModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-50 overflow-y-auto w-full h-full">
        <div class="relative top-10 mx-auto p-5 border w-3/4 max-w-4xl shadow-lg rounded-md bg-white mb-20">
            <h3 class="text-xl font-bold leading-6 text-gray-900 mb-6 border-b pb-4" id="modalTitle">연수원 폼</h3>
            <form id="centerForm" class="space-y-6">
                <!-- 1. 기본 정보 그룹 -->
                <div class="bg-gray-50 p-4 rounded-lg space-y-4">
                    <h4 class="font-semibold text-gray-700">📌 기본 정보</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">연수원명 *</label>
                            <input type="text" id="centerName" required
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">지점/위치 *</label>
                            <input type="text" id="centerBranch" required
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">지역(도/시)</label>
                            <input type="text" id="centerRegion" placeholder="예: 경기도, 서울특별시"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">수용인원</label>
                            <input type="number" id="centerCapacity" placeholder="예: 300"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">연락처</label>
                            <input type="text" id="centerContact" placeholder="예: 02-1234-5678"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">기본정보 설명 *</label>
                            <textarea id="centerBasicInfo" required
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 h-24"
                                placeholder="연수원의 주요 시설 및 특징을 입력해주세요."></textarea>
                        </div>
                    </div>
                </div>

                <!-- 2. 온라인 링크 그룹 -->
                <div class="bg-gray-50 p-4 rounded-lg space-y-4">
                    <h4 class="font-semibold text-gray-700">🔗 관련 링크</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">네이버 지도 링크 *</label>
                            <input type="url" id="centerNaverLink" required
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500"
                                placeholder="https://map.naver.com/...">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">웹사이트 링크 *</label>
                            <input type="url" id="centerWebsite" required
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500"
                                placeholder="https://...">
                        </div>
                    </div>
                </div>

                <!-- 3. 위치 설정 그룹 (지도 연동) -->
                <div class="bg-gray-50 p-4 rounded-lg space-y-4">
                    <h4 class="font-semibold text-gray-700">📍 위치 설정</h4>
                    <div class="flex gap-2">
                        <input type="text" id="searchAddress" placeholder="지번, 도로명 주소 검색..."
                            class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        <button type="button" id="mapSearchBtn"
                            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 whitespace-nowrap font-medium transition-colors">주소
                            찾기</button>
                    </div>
                    <!-- 네이버 지도가 렌더링될 영역 -->
                    <div id="map" class="h-64 w-full rounded-lg border border-gray-300 shadow-inner"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500">위도 (직접 수정 가능)</label>
                            <input type="number" id="centerLat" step="any"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-white focus:ring-blue-500 focus:border-blue-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500">경도 (직접 수정 가능)</label>
                            <input type="number" id="centerLng" step="any"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-white focus:ring-blue-500 focus:border-blue-500 text-sm">
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t">
                    <button type="button" id="cancelBtn"
                        class="px-6 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 rounded-lg transition-colors">취소</button>
                    <button type="submit"
                        class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeFirebaseApp } from '../firebase-config.js';

        const { db, auth, modules } = await initializeFirebaseApp();
        const { getDoc, doc, getDocs, collection, addDoc, updateDoc, deleteDoc } = modules;
        const { signOut, onAuthStateChanged } = modules;

        // ✅ 인증 + isAdmin 검증 (기능 7)
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = './login.html';
                return;
            }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!userDoc.exists() || userDoc.data().isAdmin !== true) {
                await signOut(auth);
                window.location.href = './login.html';
                return;
            }
            document.getElementById('adminEmail').textContent = user.email;
        });

        // ===== 통계 계산 및 렌더링 (기능 11) =====
        async function renderStats(centers) {
            const total = centers.length;
            const regionMap = {};
            let capacitySum = 0, capacityCount = 0;
            let latestDate = null;

            centers.forEach(c => {
                // 지역별 카운트
                const r = c.region || '기타';
                regionMap[r] = (regionMap[r] || 0) + 1;

                // 수용인원 합계
                if (c.capacity) { capacitySum += parseInt(c.capacity); capacityCount++; }

                // 최근 등록일
                const created = c.createdAt?.toDate?.() || (c.createdAt ? new Date(c.createdAt) : null);
                if (created && (!latestDate || created > latestDate)) latestDate = created;
            });

            // 요약 카드
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-regions').textContent = Object.keys(regionMap).length;
            document.getElementById('stat-avg').textContent = capacityCount > 0 ? Math.round(capacitySum / capacityCount) : '-';
            document.getElementById('stat-latest').textContent = latestDate
                ? latestDate.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' })
                : '-';

            // 지역별 바 차트
            const maxVal = Math.max(...Object.values(regionMap), 1);
            const sorted = Object.entries(regionMap).sort((a, b) => b[1] - a[1]);
            document.getElementById('region-chart').innerHTML = sorted.map(([region, count]) => `
                <div class="bar-chart-row">
                    <span class="bar-chart-label">${region}</span>
                    <div class="bar-chart-bar-wrap">
                        <div class="bar-chart-bar" style="width:${Math.round(count / maxVal * 100)}%"></div>
                    </div>
                    <span class="bar-chart-count">${count}</span>
                </div>
            `).join('');

            // 최근 등록 5개 (createdAt 기준 정렬)
            const recent = [...centers]
                .filter(c => c.createdAt)
                .sort((a, b) => {
                    const da = a.createdAt?.toDate?.() || new Date(a.createdAt);
                    const db2 = b.createdAt?.toDate?.() || new Date(b.createdAt);
                    return db2 - da;
                })
                .slice(0, 5);

            document.getElementById('recent-list').innerHTML = recent.length > 0 ? recent.map(c => {
                const d = c.createdAt?.toDate?.() || new Date(c.createdAt);
                return `
                    <div class="flex justify-between items-center py-2 border-b border-gray-100 last:border-0">
                        <div>
                            <span class="font-medium text-sm text-gray-800">${c.name}</span>
                            ${c.region ? `<span class="ml-2 text-xs text-gray-400">${c.region}</span>` : ''}
                        </div>
                        <span class="text-xs text-gray-400">${d.toLocaleDateString('ko-KR')}</span>
                    </div>
                `;
            }).join('') : '<p class="text-sm text-gray-400">등록 날짜 정보 없음</p>';
        }

        // ===== 연수원 목록 로드 =====
        // 전역 상태 관리
        let allCenters = [];

        async function loadCenters() {
            const centersList = document.getElementById('centersList');
            centersList.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">데이터를 불러오는 중...</td></tr>';

            const querySnapshot = await getDocs(collection(db, "trainingCenters"));
            allCenters = [];
            querySnapshot.forEach((d) => {
                allCenters.push({ id: d.id, ...d.data() });
            });

            // 생성일 최신순으로 정렬
            allCenters.sort((a, b) => {
                const dateA = a.createdAt?.seconds || 0;
                const dateB = b.createdAt?.seconds || 0;
                return dateB - dateA;
            });

            // 통계 렌더링
            await renderStats(allCenters);

            // 초기 전체 데이터 그리기
            renderTable(allCenters);
        }

        // 테이블 렌더링 함수
        function renderTable(centers) {
            const centersList = document.getElementById('centersList');
            if (centers.length === 0) {
                centersList.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">등록된 연수원이 없거나 검색 결과가 없습니다</td></tr>';
                return;
            }

            centersList.innerHTML = centers.map((center, i) => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-sm text-gray-500">${i + 1}</td>
                    <td class="px-4 py-3">
                        <div class="text-sm font-medium text-gray-900">${center.name || '-'}</div>
                        <div class="text-xs text-gray-400">${center.branch || ''}</div>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600">${center.region || '-'}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${center.capacity ? center.capacity.toLocaleString() + '명' : '-'}</td>
                    <td class="px-4 py-3">
                        <div class="text-xs text-gray-500 max-w-xs truncate">${center.basicInfo || '-'}</div>
                    </td>
                    <td class="px-4 py-3 text-sm font-medium whitespace-nowrap">
                        <button class="text-blue-600 hover:text-blue-900 mr-3" onclick="editCenter('${center.id}')">수정</button>
                        <button class="text-red-600 hover:text-red-900" onclick="deleteCenter('${center.id}')">삭제</button>
                    </td>
                </tr>
            `).join('');
        }

        // 검색 이벤트
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            if (!keyword) {
                renderTable(allCenters);
                return;
            }
            const filtered = allCenters.filter(c =>
                (c.name && c.name.toLowerCase().includes(keyword)) ||
                (c.branch && c.branch.toLowerCase().includes(keyword)) ||
                (c.region && c.region.toLowerCase().includes(keyword)) ||
                (c.basicInfo && c.basicInfo.toLowerCase().includes(keyword))
            );
            renderTable(filtered);
        });

        // ===== 모달 및 지도 관련 =====
        const centerModal = document.getElementById('centerModal');
        const centerForm = document.getElementById('centerForm');
        let currentCenterId = null;
        let map = null;
        let marker = null;

        // 지도 초기화 및 마커 세팅 함수
        function initOrUpdateMap(lat, lng) {
            const coord = new naver.maps.LatLng(lat, lng);
            if (!map) {
                map = new naver.maps.Map('map', {
                    center: coord,
                    zoom: 14
                });
                naver.maps.Event.addListener(map, 'click', function (e) {
                    updateMarker(e.coord);
                    document.getElementById('centerLat').value = e.coord.lat();
                    document.getElementById('centerLng').value = e.coord.lng();
                });
            } else {
                map.setCenter(coord);
            }
            updateMarker(coord);
        }

        function updateMarker(coord) {
            if (!marker) {
                marker = new naver.maps.Marker({
                    position: coord,
                    map: map,
                    draggable: true
                });
                naver.maps.Event.addListener(marker, 'dragend', function (e) {
                    document.getElementById('centerLat').value = e.coord.lat();
                    document.getElementById('centerLng').value = e.coord.lng();
                });
            } else {
                marker.setPosition(coord);
                if (!marker.getMap()) marker.setMap(map);
            }
        }

        // 주소 검색 버튼 이벤트
        document.getElementById('mapSearchBtn').addEventListener('click', () => {
            const address = document.getElementById('searchAddress').value.trim();
            if (!address) {
                alert('검색할 주소를 입력해주세요!');
                return;
            }
            naver.maps.Service.geocode({ query: address }, function (status, response) {
                if (status !== naver.maps.Service.Status.OK || response.v2.addresses.length === 0) {
                    alert('주소 검색 결과가 없습니다.');
                    return;
                }
                const result = response.v2.addresses[0];
                const lat = parseFloat(result.y);
                const lng = parseFloat(result.x);
                document.getElementById('centerLat').value = lat;
                document.getElementById('centerLng').value = lng;
                initOrUpdateMap(lat, lng);
            });
        });

        // 엔터키 주소 검색 방지 및 실행
        document.getElementById('searchAddress').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('mapSearchBtn').click();
            }
        });

        // 폼 초기화 유틸
        function resetForm() {
            centerForm.reset();
            currentCenterId = null;
            document.getElementById('modalTitle').textContent = '새 연수원 추가';
            if (marker) marker.setMap(null);
        }

        // 연수원 추가 버튼
        document.getElementById('addCenterBtn').addEventListener('click', () => {
            resetForm();
            centerModal.classList.remove('hidden');
            // 모달이 열린 직후 지도 사이즈 버그를 방지하기 위해 setTimeout 사용
            setTimeout(() => {
                // 기본 위치 (서울 중심 등)
                initOrUpdateMap(37.5666805, 126.9784147);
                if (map) map.autoResize();
            }, 100);
        });

        // 연수원 수정 버튼
        window.editCenter = async (centerId) => {
            currentCenterId = centerId;
            const docSnap = await getDoc(doc(db, "trainingCenters", centerId));
            const center = docSnap.data();

            document.getElementById('centerName').value = center.name || '';
            document.getElementById('centerBranch').value = center.branch || '';
            document.getElementById('centerRegion').value = center.region || '';
            document.getElementById('centerCapacity').value = center.capacity || '';
            document.getElementById('centerContact').value = center.contact || '';
            document.getElementById('centerBasicInfo').value = center.basicInfo || '';
            document.getElementById('centerNaverLink').value = center.links?.naver || '';
            document.getElementById('centerWebsite').value = center.links?.website || '';

            const lat = center.location?.lat || 37.5666805;
            const lng = center.location?.lng || 126.9784147;
            document.getElementById('centerLat').value = center.location?.lat || '';
            document.getElementById('centerLng').value = center.location?.lng || '';

            document.getElementById('modalTitle').textContent = '연수원 수정';
            centerModal.classList.remove('hidden');

            setTimeout(() => {
                initOrUpdateMap(lat, lng);
                if (map) map.autoResize();
            }, 100);
        };

        window.deleteCenter = async (centerId) => {
            if (confirm('정말 삭제하시겠습니까? 삭제 후에는 복구할 수 없습니다.')) {
                await deleteDoc(doc(db, "trainingCenters", centerId));
                loadCenters();
            }
        };

        // 엑셀 다운로드 (새 필드 포함)
        document.getElementById('excelDownBtn').addEventListener('click', async () => {
            const querySnapshot = await getDocs(collection(db, "trainingCenters"));
            const data = [];
            let i = 1;
            querySnapshot.forEach((d) => {
                const c = d.data();
                data.push({
                    '번호': i++, '연수원명': c.name, '지점': c.branch || '',
                    '지역': c.region || '', '수용인원': c.capacity || '',
                    '연락처': c.contact || '', '기본정보': c.basicInfo || '',
                    '위도': c.location?.lat || '', '경도': c.location?.lng || '',
                    '네이버 지도': c.links?.naver || '', '웹사이트': c.links?.website || ''
                });
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "연수원목록");
            XLSX.writeFile(wb, "연수원목록.xlsx");
        });

        // 폼 닫기
        document.getElementById('cancelBtn').addEventListener('click', () => {
            centerModal.classList.add('hidden');
        });

        window.addEventListener('click', (event) => {
            if (event.target === centerModal) {
                centerModal.classList.add('hidden');
            }
        });

        // 폼 저장 로직
        centerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const latVal = document.getElementById('centerLat').value;
            const lngVal = document.getElementById('centerLng').value;
            if (!latVal || !lngVal) {
                alert('주소를 검색하거나 지도에서 위치를 클릭해서 위도/경도를 입력해주세요!');
                return;
            }

            const centerData = {
                name: document.getElementById('centerName').value.trim(),
                branch: document.getElementById('centerBranch').value.trim(),
                region: document.getElementById('centerRegion').value.trim(),
                capacity: parseInt(document.getElementById('centerCapacity').value) || 0,
                contact: document.getElementById('centerContact').value.trim(),
                basicInfo: document.getElementById('centerBasicInfo').value.trim(),
                links: {
                    naver: document.getElementById('centerNaverLink').value.trim(),
                    website: document.getElementById('centerWebsite').value.trim()
                },
                location: {
                    lat: parseFloat(latVal),
                    lng: parseFloat(lngVal)
                },
                updatedAt: new Date()
            };

            try {
                if (currentCenterId) {
                    await updateDoc(doc(db, "trainingCenters", currentCenterId), centerData);
                } else {
                    centerData.createdAt = new Date();
                    await addDoc(collection(db, "trainingCenters"), centerData);
                }
                centerModal.classList.add('hidden');
                currentCenterId = null;
                alert('성공적으로 저장되었습니다!');
                loadCenters();
            } catch (error) {
                console.error('Error saving center:', error);
                alert('저장 중 오류가 발생했습니다.');
            }
        });

        // 로그아웃
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = './login.html');
        });

        loadCenters();
    </script>
</body>

</html>
