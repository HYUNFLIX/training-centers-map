<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>연수원 관리 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript"
        src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=9r2jb00oue&submodules=geocoder,service"></script>
    <style>
        /* 지역별 분포 CSS 바 차트 */
        .bar-chart-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .bar-chart-label {
            width: 50px;
            font-size: 12px;
            color: #555;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-chart-bar-wrap {
            flex: 1;
            background: #f0f0f0;
            border-radius: 4px;
            height: 20px;
            overflow: hidden;
        }

        .bar-chart-bar {
            background: #3b82f6;
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
            min-width: 2px;
        }

        .bar-chart-count {
            width: 30px;
            font-size: 12px;
            color: #333;
            font-weight: 600;
            flex-shrink: 0;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <style>
        /* 메인 홈페이지와 유사한 헤더 스타일 정의 (Tailwind 기반 보조) */
        .main-header {
            background-color: #0f172a;
            /* Slate 900 for modern admin look */
            color: white;
            padding: 1rem 0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .main-header a {
            color: white;
            text-decoration: none;
        }

        .main-header nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin: 0;
            padding: 0;
        }

        .main-header nav a {
            opacity: 0.7;
            font-size: 0.95rem;
            font-weight: 500;
            padding-bottom: 4px;
            transition: all 0.2s ease;
        }

        .main-header nav a:hover,

            opacity: 1;

            /* sky-400 */

        .main-header nav a.active {

        }

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-10">
            <div class="flex items-center gap-3">
                <a href="../index.html"

                <ul>

    <!-- 메인 컨텐츠 -->
    <main class="flex-grow max-w-[90rem] w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">연수원 통합 목록</h1>

        </div>

        <!-- 제어 영역 (검색 & 버튼) -->

            class="mb-6 flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">

            <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto items-center">

            <!-- Right Side / Search & Sort -->

                    <select id="sortSelect"

                    </thead>
                    <tbody id="centersList" class="bg-white divide-y divide-slate-100">

                                        stroke-width="4"></circle>

    <!-- 통합 연수원 추가/수정 모달 -->
    <div id="centerModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-50 overflow-y-auto w-full h-full">
        <div class="relative top-10 mx-auto p-5 border w-3/4 max-w-4xl shadow-lg rounded-md bg-white mb-20">
            <h3 class="text-xl font-bold leading-6 text-gray-900 mb-6 border-b pb-4" id="modalTitle">연수원 폼</h3>
            <form id="centerForm" class="space-y-6">

                <!-- ===== 0. 네이버 검색 섹션 (추가 모드에서만 표시) ===== -->
                <div id="naverSearchSection" class="bg-blue-50 border border-blue-200 p-4 rounded-lg space-y-3">
                    <h4 class="font-semibold text-blue-700">🔍 네이버에서 연수원 검색</h4>
                    <p class="text-xs text-blue-500">연수원명을 검색하면 주소·좌표·전화번호가 자동으로 입력됩니다.</p>
                    <div class="flex gap-2">
                        <input type="text" id="naverSearchInput" placeholder="예: KB증권 연수원, 삼성 인재개발원"
                            class="block w-full rounded-md border-blue-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 text-sm">
                        <button type="button" id="naverSearchBtn"

                            검색
                        </button>
                    </div>
                    <!-- 검색 결과 표시 -->

                        class="hidden space-y-1 max-h-56 overflow-y-auto border border-blue-100 rounded-md bg-white">
                        <!-- 결과 항목이 동적으로 삽입됩니다 -->
                    </div>
                    <div id="naverSearchStatus" class="text-xs text-gray-400 hidden"></div>
                </div>

                <!-- 1. 기본 정보 그룹 -->
                <div class="bg-gray-50 p-4 rounded-lg space-y-4">
                    <h4 class="font-semibold text-gray-700">📌 기본 정보</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">연수원명 *</label>
                            <input type="text" id="centerName" required
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">지역(도/시)</label>
                            <input type="text" id="centerRegion" placeholder="예: 경기도, 서울특별시"

                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">연락처</label>
                            <input type="text" id="centerContact" placeholder="예: 02-1234-5678"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">기본정보 설명 *</label>
                            <textarea id="centerBasicInfo" required
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 h-24"

                        </div>
                        <div class="md:col-span-2 flex items-center mt-2">
                            <input type="checkbox" id="centerIsYouthFacility"
                                class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded cursor-pointer">
                            <label for="centerIsYouthFacility" class="ml-2 block text-sm text-gray-900 font-medium">청소년
                                수련 시설 여부 (체크 시 지도 필터에 적용됨)</label>
                        </div>
                    </div>
                </div>


                <!-- 2. 온라인 링크 그룹 -->
                <div class="bg-gray-50 p-4 rounded-lg space-y-4">
                    <h4 class="font-semibold text-gray-700">🔗 관련 링크</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">네이버 지도 링크 *</label>
                            <input type="url" id="centerNaverLink" required
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500"

                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">웹사이트 링크</label>
                            <input type="url" id="centerWebsite"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500"

                    </div>
                </div>

                <!-- 3. 위치 설정 그룹 (지도 연동) -->
                <div class="bg-gray-50 p-4 rounded-lg space-y-4">
                    <h4 class="font-semibold text-gray-700">📍 위치 설정</h4>
                    <div class="flex gap-2">
                        <input type="text" id="searchAddress" placeholder="지번, 도로명 주소 검색..."
                            class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        <button type="button" id="mapSearchBtn"
                            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 whitespace-nowrap font-medium transition-colors">주소
                            찾기</button>
                    </div>
                    <!-- 네이버 지도가 렌더링될 영역 -->
                    <div id="map" class="h-64 w-full rounded-lg border border-gray-300 shadow-inner"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500">위도 (직접 수정 가능)</label>
                            <input type="number" id="centerLat" step="any"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-white focus:ring-blue-500 focus:border-blue-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500">경도 (직접 수정 가능)</label>
                            <input type="number" id="centerLng" step="any"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-white focus:ring-blue-500 focus:border-blue-500 text-sm">
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t">
                    <button type="button" id="cancelBtn"
                        class="px-6 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 rounded-lg transition-colors">취소</button>
                    <button type="submit"
                        class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeFirebaseApp } from '../firebase-config.js';

        const { db, auth, modules } = await initializeFirebaseApp();
        const { getDoc, doc, getDocs, collection, addDoc, updateDoc, deleteDoc } = modules;
        const { signOut, onAuthStateChanged } = modules;

        // ✅ 인증 확인 및 관리자 권한 검증
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = './login.html';
                return;
            }
            try {
                const userDocRef = doc(db, 'users', user.uid);
                const userDoc = await getDoc(userDocRef);
                if (!userDoc.exists() || userDoc.data().isAdmin !== true) {
                    // 권한 없음: 로그아웃 및 접근 차단
                    alert('관리자 권한이 없습니다. 접근이 차단되었습니다.');
                    await signOut(auth);
                    window.location.href = './login.html';
                    return;
                }
            } catch (e) {
                console.error('Firestore 관리자 권한 확인 중 오류:', e);
                alert('권한 확인 중 오류가 발생했습니다.');
                await signOut(auth);
                window.location.href = './login.html';
                return;
            }
            // 검증이 완료된 최고 관리자만 아래 코드 실행
            document.getElementById('adminEmail').textContent = user.email;
        });



        // ===== 연수원 목록 로드 =====
        // 전역 상태 관리
        let allCenters = [];
        let filteredCenters = [];
        let currentPage = 1;
        const PAGE_SIZE = 50;
        let currentSort = 'name'; // 초기 정렬: 이름순
        let selectedCenters = new Set(); // 다중 선택 목록 저장

        // 데이터 일괄 스왑 기능
        const fixLinksBtn = document.getElementById('fixLinksBtn');
        if (fixLinksBtn) {
            fixLinksBtn.addEventListener('click', async () => {
                if (!confirm('모든 연수원의 네이버 링크와 웹사이트 링크를 서로 맞바꿉니다. 진행하시겠습니까? (이 작업 후 새로고침하세요)')) return;
                try {
                    const qs = await getDocs(collection(db, "trainingCenters"));
                    let count = 0;
                    for (const docSnap of qs.docs) {
                        const data = docSnap.data();
                        if (data.links && data.links.naver && data.links.website) {
                            await updateDoc(doc(db, "trainingCenters", docSnap.id), {
                                links: { naver: data.links.website, website: data.links.naver }
                            });
                            count++;
                        }
                    }
                    alert(`총 ${count}개의 연수원 정보가 스왑되었습니다!`);
                    loadCenters();
                } catch (e) { alert("에러: " + e.message); }
            });
        }

        // 정렬 이벤트 핸들러
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            applySort();
            renderTable();
        });

        function applySort() {
            if (currentSort === 'name') {
                const sortByName = (a, b) => {
                    const nameA = (a.name || '').toLowerCase();
                    const nameB = (b.name || '').toLowerCase();
                    if (nameA < nameB) return -1;
                    if (nameA > nameB) return 1;
                    return 0;
                };
                allCenters.sort(sortByName);
                filteredCenters.sort(sortByName);
            } else if (currentSort === 'recent') {
                allCenters.sort((a, b) => {
                    const dateA = a.createdAt?.seconds || 0;
                    const dateB = b.createdAt?.seconds || 0;
                    return dateB - dateA;
                });
                filteredCenters.sort((a, b) => {
                    const dateA = a.createdAt?.seconds || 0;
                    const dateB = b.createdAt?.seconds || 0;
                    return dateB - dateA;
                });
            }
        }

        async function loadCenters() {
            const centersList = document.getElementById('centersList');
            centersList.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">데이터를 불러오는 중...</td></tr>';

            const querySnapshot = await getDocs(collection(db, "trainingCenters"));
            allCenters = [];
            querySnapshot.forEach((d) => {
                allCenters.push({ id: d.id, ...d.data() });
            });

            filteredCenters = [...allCenters];
            applySort(); // 최초 로드시 정렬 적용

            currentPage = 1;
            selectedCenters.clear();
            updateActionBar();
            document.getElementById('selectAllCheckbox').checked = false;
            renderTable();
        }

        // 다중 선택 상태 업데이트 함수
        function updateActionBar() {
            const actionBar = document.getElementById('batchActionBar');
            const countSpan = document.getElementById('selectedCount');
            const selectAllCheck = document.getElementById('selectAllCheckbox');

            if (selectedCenters.size > 0) {
                actionBar.classList.remove('hidden');
                countSpan.textContent = selectedCenters.size;
            } else {
                actionBar.classList.add('hidden');
                selectAllCheck.checked = false;
            }
        }

        window.toggleCenterSelection = function (checkbox, centerId) {
            if (checkbox.checked) {
                selectedCenters.add(centerId);
            } else {
                selectedCenters.delete(centerId);
                document.getElementById('selectAllCheckbox').checked = false;
            }
            updateActionBar();
        };

        // 전체 선택/해제 핸들러
        document.getElementById('selectAllCheckbox').addEventListener('click', (e) => {
            const isChecked = e.target.checked;
            const checkboxes = document.querySelectorAll('.center-checkbox');

            checkboxes.forEach(cb => {
                cb.checked = isChecked;
                if (isChecked) {
                    selectedCenters.add(cb.value);
                } else {
                    selectedCenters.delete(cb.value);
                }
            });
            updateActionBar();
        });

        // 다중 삭제 로직
        document.getElementById('deleteSelectedBtn').addEventListener('click', async () => {
            if (selectedCenters.size === 0) return;

            if (confirm(`정말 선택한 ${selectedCenters.size}개의 연수원을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) {
                try {
                    document.getElementById('deleteSelectedBtn').textContent = '삭제 중...';
                    document.getElementById('deleteSelectedBtn').disabled = true;

                    const deletePromises = Array.from(selectedCenters).map(id => deleteDoc(doc(db, "trainingCenters", id)));
                    await Promise.all(deletePromises);

                    alert(`${selectedCenters.size}개의 연수원이 삭제되었습니다.`);
                    selectedCenters.clear();
                    document.getElementById('deleteSelectedBtn').textContent = '선택 삭제';
                    document.getElementById('deleteSelectedBtn').disabled = false;
                    const savedPage = currentPage;
                    await loadCenters();
                    adminGoToPage(savedPage);
                } catch (error) {
                    console.error('Batch delete error:', error);
                    alert('일괄 삭제 중 오류가 발생했습니다.');
                    document.getElementById('deleteSelectedBtn').textContent = '선택 삭제';
                    document.getElementById('deleteSelectedBtn').disabled = false;
                }
            }
        });

        // 테이블 렌더링 함수 (페이지네이션 지원)
        function renderTable() {
            const centersList = document.getElementById('centersList');
            const selectAllCheckbox = document.getElementById('selectAllCheckbox');

            if (filteredCenters.length === 0) {
                centersList.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">등록된 연수원이 없거나 검색 결과가 없습니다</td></tr>';
                document.getElementById('adminPagination').innerHTML = '';
                selectAllCheckbox.disabled = true;
                return;
            }

            selectAllCheckbox.disabled = false;

            const totalPages = Math.ceil(filteredCenters.length / PAGE_SIZE);
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * PAGE_SIZE;
            const pageItems = filteredCenters.slice(start, start + PAGE_SIZE);

            // 현재 페이지의 모든 항목이 선택되었는지 확인
            const allPageItemsSelected = pageItems.every(c => selectedCenters.has(c.id));
            selectAllCheckbox.checked = pageItems.length > 0 && allPageItemsSelected;

            centersList.innerHTML = pageItems.map((center, i) => {
                let isYouth = false;
                if (center.isYouthFacility !== undefined) {
                    isYouth = center.isYouthFacility;
                } else {
                    isYouth = (center.name || '').includes('청소년') ||
                        (center.name || '').includes('수련원') ||
                        (center.name || '').includes('학생') ||
                        (center.name || '').includes('야영장');
                }

                return `
                <tr class="hover:bg-slate-50 transition-colors ${selectedCenters.has(center.id) ? 'bg-sky-50' : ''}">
                    <td class="px-5 py-4">
                        <input type="checkbox" class="center-checkbox h-4 w-4 text-sky-600 focus:ring-sky-500 border-slate-300 rounded cursor-pointer transition-colors" 
                            value="${center.id}" 
                            ${selectedCenters.has(center.id) ? 'checked' : ''}
                            onchange="toggleCenterSelection(this, '${center.id}')">
                    </td>
                    <td class="px-5 py-4 text-sm text-slate-500 font-medium">${start + i + 1}</td>
                    <td class="px-5 py-4 whitespace-nowrap">
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-slate-800">${center.name || '-'}</span>
                            ${isYouth ? '<span class="mt-1 inline-flex w-max items-center px-2 py-0.5 rounded text-xs font-semibold bg-amber-100 text-amber-700">청소년시설</span>' : ''}
                        </div>
                    </td>
                    <td class="px-5 py-4 whitespace-nowrap text-sm text-slate-600">
                        ${center.region || '-'}
                    </td>
                    <td class="px-5 py-4 whitespace-nowrap text-sm text-slate-600">
                        ${center.contact || '-'}
                    </td>
                    <td class="px-5 py-4">
                        <div class="text-xs text-slate-500 max-w-xs line-clamp-2" title="${center.basicInfo || ''}">${center.basicInfo || '-'}</div>
                    </td>
                    <td class="px-5 py-4 whitespace-nowrap">
                        <div class="flex items-center gap-3">
                            <label class="inline-flex flex-col items-center cursor-pointer mr-2">
                                <span class="text-[10px] font-semibold text-slate-400 mb-1">청소년시설</span>
                                <div class="relative">
                                    <input type="checkbox" class="sr-only peer" ${isYouth ? 'checked' : ''} onchange="toggleIsYouthFacility('${center.id}', this.checked)">
                                    <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-sky-300 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-sky-500"></div>
                                </div>
                            </label>
                            <div class="flex flex-col gap-1.5">
                                <button class="text-xs font-medium text-indigo-600 hover:text-indigo-900 bg-indigo-50 hover:bg-indigo-100 px-2.5 py-1 rounded transition-colors" onclick="editCenter('${center.id}')">수정</button>
                                <button class="text-xs font-medium text-rose-600 hover:text-rose-900 bg-rose-50 hover:bg-rose-100 px-2.5 py-1 rounded transition-colors" onclick="deleteCenter('${center.id}')">삭제</button>
                            </div>
                        </div>
                    </td>
                </tr>
                `;
            }).join('');

            renderPagination(totalPages);
        }

        // 페이지네이션 렌더링
        function renderPagination(totalPages) {
            const el = document.getElementById('adminPagination');
            if (totalPages <= 1) { el.innerHTML = ''; return; }

            const btnBase = "px-3 py-1.5 min-w-[36px] rounded-lg text-sm font-semibold transition-all shadow-sm border";
            const btnActive = `${btnBase} border-sky-500 bg-sky-500 text-white`;
            const btnDefault = `${btnBase} border-slate-200 bg-white text-slate-600 hover:bg-slate-50 hover:border-slate-300 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500`;
            const btnDisabled = `${btnBase} border-slate-100 bg-slate-50 text-slate-300 cursor-not-allowed`;

            let html = `<button class="${currentPage === 1 ? btnDisabled : btnDefault}" onclick="adminGoToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>`;

            const maxBtns = 7;
            let start = Math.max(1, currentPage - Math.floor(maxBtns / 2));
            let end = Math.min(totalPages, start + maxBtns - 1);
            if (end - start < maxBtns - 1) start = Math.max(1, end - maxBtns + 1);

            if (start > 1) html += `<button class="${btnDefault}" onclick="adminGoToPage(1)">1</button>${start > 2 ? '<span class="px-1 text-slate-400">...</span>' : ''}`;
            for (let p = start; p <= end; p++) {
                html += `<button class="${p === currentPage ? btnActive : btnDefault}" onclick="adminGoToPage(${p})">${p}</button>`;
            }
            if (end < totalPages) html += `${end < totalPages - 1 ? '<span class="px-1 text-slate-400">...</span>' : ''}<button class="${btnDefault}" onclick="adminGoToPage(${totalPages})">${totalPages}</button>`;

            html += `<button class="${currentPage === totalPages ? btnDisabled : btnDefault}" onclick="adminGoToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>`;

            html += `<span class="text-xs text-slate-500 font-medium ml-3 bg-white px-3 py-1.5 rounded-lg border border-slate-200">총 <span class="text-sky-600 font-bold">${filteredCenters.length}</span>건 <span class="mx-1 text-slate-300">|</span> 페이지 <span class="text-slate-800 font-bold">${currentPage}</span> / ${totalPages}</span>`;
            el.innerHTML = html;
        }

        window.adminGoToPage = function (page) {
            const totalPages = Math.ceil(filteredCenters.length / PAGE_SIZE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
            document.getElementById('centersTable')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        // 검색 이벤트
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            filteredCenters = keyword
                ? allCenters.filter(c =>
                    (c.name && c.name.toLowerCase().includes(keyword)) ||
                    (c.branch && c.branch.toLowerCase().includes(keyword)) ||
                    (c.region && c.region.toLowerCase().includes(keyword)) ||
                    (c.basicInfo && c.basicInfo.toLowerCase().includes(keyword))
                )
                : allCenters;
            applySort(); // 검색 후에도 현재 정렬 조건 유지
            currentPage = 1;
            renderTable();
        });

        // ===== 모달 및 지도 관련 =====
        const centerModal = document.getElementById('centerModal');
        const centerForm = document.getElementById('centerForm');
        let currentCenterId = null;
        let map = null;
        let marker = null;

        // 지도 초기화 및 마커 세팅 함수
        function initOrUpdateMap(lat, lng) {
            const coord = new naver.maps.LatLng(lat, lng);
            if (!map) {
                map = new naver.maps.Map('map', {
                    center: coord,
                    zoom: 14
                });
                naver.maps.Event.addListener(map, 'click', function (e) {
                    updateMarker(e.coord);
                    document.getElementById('centerLat').value = e.coord.lat();
                    document.getElementById('centerLng').value = e.coord.lng();
                });
            } else {
                map.setCenter(coord);
            }
            updateMarker(coord);
        }

        function updateMarker(coord) {
            if (!marker) {
                marker = new naver.maps.Marker({
                    position: coord,
                    map: map,
                    draggable: true
                });
                naver.maps.Event.addListener(marker, 'dragend', function (e) {
                    document.getElementById('centerLat').value = e.coord.lat();
                    document.getElementById('centerLng').value = e.coord.lng();
                });
            } else {
                marker.setPosition(coord);
                if (!marker.getMap()) marker.setMap(map);
            }
        }

        // 주소 검색 버튼 이벤트
        document.getElementById('mapSearchBtn').addEventListener('click', () => {
            const address = document.getElementById('searchAddress').value.trim();
            if (!address) {
                alert('검색할 주소를 입력해주세요!');
                return;
            }
            naver.maps.Service.geocode({ query: address }, function (status, response) {
                if (status !== naver.maps.Service.Status.OK || response.v2.addresses.length === 0) {
                    alert('주소 검색 결과가 없습니다.');
                    return;
                }
                const result = response.v2.addresses[0];
                const lat = parseFloat(result.y);
                const lng = parseFloat(result.x);
                document.getElementById('centerLat').value = lat;
                document.getElementById('centerLng').value = lng;
                initOrUpdateMap(lat, lng);
            });
        });

        // 엔터키 주소 검색 방지 및 실행
        document.getElementById('searchAddress').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('mapSearchBtn').click();
            }
        });

        // 폼 초기화 유틸
        function resetForm() {
            centerForm.reset();
            currentCenterId = null;
            document.getElementById('modalTitle').textContent = '새 연수원 추가';
            if (marker) marker.setMap(null);
            // 네이버 검색 초기화
            document.getElementById('naverSearchInput').value = '';
            document.getElementById('naverSearchResults').innerHTML = '';
            document.getElementById('naverSearchResults').classList.add('hidden');
            document.getElementById('naverSearchStatus').classList.add('hidden');
            document.getElementById('centerIsYouthFacility').checked = false;
        }

        // ===== 네이버 지역 검색 API (REST) =====
        const NAVER_CLIENT_ID = 'nQzRhczvTq8q3mu8MzlA';
        const NAVER_CLIENT_SECRET = 'Ryo3nBB0Hv';

        async function searchNaverLocal(query) {
            const statusEl = document.getElementById('naverSearchStatus');
            const resultsEl = document.getElementById('naverSearchResults');
            statusEl.textContent = '검색 중...';
            statusEl.classList.remove('hidden');
            resultsEl.classList.add('hidden');
            resultsEl.innerHTML = '';

            try {
                // corsproxy.io를 통해 CORS 우회 → 네이버 Local Search REST API 호출
                const naverUrl = `https://openapi.naver.com/v1/search/local.json?query=${encodeURIComponent(query)}&display=8&sort=comment`;
                const res = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(naverUrl)}`, {
                    headers: {
                        'X-Naver-Client-Id': NAVER_CLIENT_ID,
                        'X-Naver-Client-Secret': NAVER_CLIENT_SECRET,
                    }
                });

                if (!res.ok) throw new Error(`API 오류 ${res.status}`);
                const data = await res.json();
                const items = data.items || [];

                if (!items.length) {
                    statusEl.textContent = '검색 결과가 없습니다. 다른 검색어로 시도하세요.';
                    return;
                }

                statusEl.classList.add('hidden');
                resultsEl.classList.remove('hidden');
                resultsEl.innerHTML = items.map((item) => {
                    // 네이버 REST API 좌표: mapx/mapy (1/10,000,000도)
                    const lat = parseInt(item.mapy) / 10000000;
                    const lng = parseInt(item.mapx) / 10000000;
                    const name = item.title.replace(/<[^>]+>/g, ''); // HTML 태그 제거
                    const addr = item.roadAddress || item.address || '';
                    const phone = item.telephone || '';
                    const category = item.category || '';
                    const link = item.link || '';
                    return `
                        <div class="naver-result-item flex items-start gap-3 p-3 hover:bg-blue-50 cursor-pointer border-b border-gray-100 last:border-0 transition-colors"
                             data-lat="${lat}" data-lng="${lng}"
                             data-name="${name}" data-address="${addr}"
                             data-phone="${phone}" data-category="${category}" data-link="${link}">
                            <div class="flex-1 min-w-0">
                                <div class="font-medium text-sm text-gray-800">${name}</div>
                                ${category ? `<div class="text-xs text-blue-500 mt-0.5">${category}</div>` : ''}
                                <div class="text-xs text-gray-500 mt-0.5 truncate">${addr}</div>
                                ${phone ? `<div class="text-xs text-gray-400 mt-0.5">📞 ${phone}</div>` : ''}
                                <div class="text-xs text-blue-400 mt-0.5">📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
                            </div>
                            <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full whitespace-nowrap mt-1 shrink-0">선택</span>
                        </div>
                    `;
                }).join('');

                // 선택 이벤트
                resultsEl.querySelectorAll('.naver-result-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const lat = parseFloat(el.dataset.lat);
                        const lng = parseFloat(el.dataset.lng);
                        const name = el.dataset.name;
                        const address = el.dataset.address;
                        const phone = el.dataset.phone;
                        const category = el.dataset.category;
                        const link = el.dataset.link;

                        document.getElementById('centerName').value = name;
                        document.getElementById('centerLat').value = lat;
                        document.getElementById('centerLng').value = lng;
                        document.getElementById('searchAddress').value = address;
                        if (phone) document.getElementById('centerContact').value = phone;

                        // 링크 자동 입력
                        document.getElementById('centerNaverLink').value = `https://map.naver.com/v5/search/${encodeURIComponent(name)}`;
                        if (link) document.getElementById('centerWebsite').value = link;

                        // 지역 자동 추출
                        const regionMatch = address.match(/^(서울|경기|인천|강원|충북|충남|대전|세종|전북|전남|광주|경북|경남|부산|대구|울산|제주)/);
                        if (regionMatch) document.getElementById('centerRegion').value = regionMatch[1];

                        // 기본정보 자동 입력
                        document.getElementById('centerBasicInfo').value =
                            `${name}. ${address}${phone ? '. 전화: ' + phone : ''}${category ? '. 분류: ' + category : ''}`;

                        // 지도 업데이트
                        initOrUpdateMap(lat, lng);

                        resultsEl.classList.add('hidden');
                        statusEl.textContent = `✅ "${name}" 선택 완료. 아래 정보를 확인하고 저장하세요.`;
                        statusEl.classList.remove('hidden');
                    });
                });

            } catch (e) {
                statusEl.textContent = `검색 오류: ${e.message}`;
            }
        }

        // 네이버 검색 버튼 이벤트
        document.getElementById('naverSearchBtn').addEventListener('click', () => {
            const query = document.getElementById('naverSearchInput').value.trim();
            if (!query) { alert('검색어를 입력하세요.'); return; }
            searchNaverLocal(query);
        });
        document.getElementById('naverSearchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('naverSearchBtn').click(); }
        });

        // 연수원 추가 버튼
        document.getElementById('addCenterBtn').addEventListener('click', () => {
            resetForm();
            document.getElementById('naverSearchSection').classList.remove('hidden'); // 추가 모드: 검색창 표시
            centerModal.classList.remove('hidden');
            // 모달이 열린 직후 지도 사이즈 버그를 방지하기 위해 setTimeout 사용
            setTimeout(() => {
                // 기본 위치 (서울 중심 등)
                initOrUpdateMap(37.5666805, 126.9784147);
                if (map) map.autoResize();
            }, 100);
        });

        // 연수원 수정 버튼
        window.editCenter = (centerId) => {
            currentCenterId = centerId;
            const center = allCenters.find(c => c.id === centerId);
            if (!center) {
                alert('연수원 정보를 찾을 수 없습니다.');
                return;
            }

            document.getElementById('centerName').value = center.name || '';
            document.getElementById('centerRegion').value = center.region || '';
            document.getElementById('centerContact').value = center.contact || '';
            document.getElementById('centerBasicInfo').value = center.basicInfo || '';
            document.getElementById('centerIsYouthFacility').checked = !!center.isYouthFacility;
            document.getElementById('centerNaverLink').value = center.links?.naver || '';
            document.getElementById('centerWebsite').value = center.links?.website || '';

            const lat = center.location?.lat || 37.5666805;
            const lng = center.location?.lng || 126.9784147;
            document.getElementById('centerLat').value = center.location?.lat || '';
            document.getElementById('centerLng').value = center.location?.lng || '';

            document.getElementById('modalTitle').textContent = '연수원 수정';
            document.getElementById('naverSearchSection').classList.add('hidden'); // 수정 모드: 검색창 숨김
            centerModal.classList.remove('hidden');

            setTimeout(() => {
                initOrUpdateMap(lat, lng);
                if (map) map.autoResize();
            }, 100);
        };

        window.deleteCenter = async (centerId) => {
            if (confirm('정말 삭제하시겠습니까? 삭제 후에는 복구할 수 없습니다.')) {
                await deleteDoc(doc(db, "trainingCenters", centerId));
                const savedPage = currentPage;
                await loadCenters();
                adminGoToPage(savedPage);
            }
        };

        window.toggleIsYouthFacility = async (centerId, isChecked) => {
            try {
                await updateDoc(doc(db, "trainingCenters", centerId), {
                    isYouthFacility: isChecked,
                    updatedAt: new Date()
                });

                // 로컬 상태 업데이트
                const center = allCenters.find(c => c.id === centerId);
                if (center) center.isYouthFacility = isChecked;

                // 다시 렌더링 (보고 있던 페이지 유지)
                applySort();
                renderTable();
            } catch (error) {
                console.error('Error updating facility status:', error);
                alert('상태 업데이트 중 오류가 발생했습니다.');
                // 에러 발생 시 원래 상태로 렌더링
                renderTable();
            }
        };

        // 엑셀 다운로드 (새 필드 포함)
        document.getElementById('excelDownBtn').addEventListener('click', async () => {
            const querySnapshot = await getDocs(collection(db, "trainingCenters"));
            const data = [];
            let i = 1;
            querySnapshot.forEach((d) => {
                const c = d.data();
                data.push({
                    '번호': i++, '연수원명': c.name,
                    '지역': c.region || '',
                    '연락처': c.contact || '', '기본정보': c.basicInfo || '',
                    '위도': c.location?.lat || '', '경도': c.location?.lng || '',
                    '네이버 주소': c.links?.naver || '', '웹사이트': c.links?.website || ''
                });
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "연수원목록");
            XLSX.writeFile(wb, "연수원목록.xlsx");
        });

        // 폼 닫기
        document.getElementById('cancelBtn').addEventListener('click', () => {
            centerModal.classList.add('hidden');
        });

        window.addEventListener('click', (event) => {
            if (event.target === centerModal) {
                centerModal.classList.add('hidden');
            }
        });

        // 폼 저장 로직
        centerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const latVal = document.getElementById('centerLat').value;
            const lngVal = document.getElementById('centerLng').value;
            if (!latVal || !lngVal) {
                alert('주소를 검색하거나 지도에서 위치를 클릭해서 위도/경도를 입력해주세요!');
                return;
            }

            const centerData = {
                name: document.getElementById('centerName').value.trim(),
                region: document.getElementById('centerRegion').value.trim(),
                contact: document.getElementById('centerContact').value.trim(),
                basicInfo: document.getElementById('centerBasicInfo').value.trim(),
                isYouthFacility: document.getElementById('centerIsYouthFacility').checked,
                links: {
                    naver: document.getElementById('centerNaverLink').value.trim(),
                    website: document.getElementById('centerWebsite').value.trim()
                },
                location: {
                    lat: parseFloat(latVal),
                    lng: parseFloat(lngVal)
                },
                updatedAt: new Date()
            };

            try {
                if (currentCenterId) {
                    await updateDoc(doc(db, "trainingCenters", currentCenterId), centerData);
                } else {
                    centerData.createdAt = new Date();
                    await addDoc(collection(db, "trainingCenters"), centerData);
                }
                centerModal.classList.add('hidden');
                currentCenterId = null;
                alert('성공적으로 저장되었습니다!');
                loadCenters();
            } catch (error) {
                console.error('Error saving center:', error);
                alert('저장 중 오류가 발생했습니다.');
            }
        });

        // 로그아웃
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = './login.html');
        });

        loadCenters();
    </script>
</body>

</html>
