<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>주소 누락 데이터 복구 스크립트</title>
</head>

<body style="padding: 2rem; font-family: sans-serif;">
    <h2>연수원 주소 자동 복구 실행기</h2>
    <p>아래 버튼을 누르면 DB를 조회하여 주소(address) 필드가 누락된 연수원들을 네이버 API로 찾아내 일괄 업데이트합니다.</p>
    <button id="runBtn"
        style="padding: 10px 20px; font-size: 16px; background-color: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer;">
        복구 시작
    </button>
    <div id="log"
        style="margin-top: 20px; padding: 10px; background: #f3f4f6; max-height: 400px; overflow-y: auto; font-family: monospace;">
    </div>

    <script type="module">
        import { initializeFirebaseApp } from '../firebase-config.js';

        const NAVER_CLIENT_ID = "nQzRhczvTq8q3mu8MzlA";
        const NAVER_CLIENT_SECRET = "Ryo3nBB0Hv";

        async function fetchAddressFromName(name) {
            try {
                // Remove brackets to improve search hit rate (e.g. "한국산업인력공단 (제3산단)" -> "한국산업인력공단")
                const cleanName = name.replace(/ \((.*?)\)/g, '').trim();
                const url = `https://openapi.naver.com/v1/search/local.json?query=${encodeURIComponent(cleanName)}&display=2`;
                const res = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`, {
                    headers: {
                        'X-Naver-Client-Id': NAVER_CLIENT_ID,
                        'X-Naver-Client-Secret': NAVER_CLIENT_SECRET
                    }
                });
                if (!res.ok) return null;

                const data = await res.json();
                if (data.items && data.items.length > 0) {
                    return data.items[0].roadAddress || data.items[0].address || null;
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        function logMsg(msg) {
            const el = document.getElementById('log');
            el.innerHTML += `<div>${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        document.getElementById('runBtn').addEventListener('click', async () => {
            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            btn.innerText = '실행 중... (창을 닫지 마세요)';
            logMsg("Firebase 초기화 중...");

            try {
                const { db, auth, modules } = await initializeFirebaseApp();
                const { getDocs, collection, updateDoc, doc } = modules;

                // Wait for auth to initialize
                modules.onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        logMsg("❌ 오류: 관리자로 로그인되어 있지 않습니다. admin/login.html 에서 먼저 로그인해주세요.");
                        btn.innerText = '실패';
                        return;
                    }

                    logMsg("✅ 관리자 권한 확인됨. 데이터베이스 조회를 시작합니다...");

                    const snapshot = await getDocs(collection(db, "trainingCenters"));
                    let fixCount = 0;
                    let missingCount = 0;

                    for (const docSnap of snapshot.docs) {
                        const data = docSnap.data();

                        // Only target documents missing an address
                        if (!data.address) {
                            missingCount++;
                            logMsg(`[조회] 주소 누락 발견: ${data.name}`);

                            // Rate limit protection
                            await new Promise(r => setTimeout(r, 300));

                            const newAddress = await fetchAddressFromName(data.name);

                            if (newAddress) {
                                logMsg(`[매칭 성공] ${data.name} -> ${newAddress}`);
                                await updateDoc(doc(db, "trainingCenters", docSnap.id), {
                                    address: newAddress
                                });
                                fixCount++;
                            } else {
                                logMsg(`<span style="color:red">[매칭 실패] ${data.name} (네이버 검색 결과 없음)</span>`);
                            }
                        }
                    }

                    logMsg(`<br><b>✨ 작업 완료!</b> 총 ${missingCount}개의 누락 데이터 중 ${fixCount}개를 복구했습니다.`);
                    btn.innerText = '수정 완료';
                });

            } catch (e) {
                logMsg("❌ 예기치 못한 오류 발생: " + e.message);
                btn.innerText = '에러 발생';
            }
        });
    </script>
</body>

</html>
